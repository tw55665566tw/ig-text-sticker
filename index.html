<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IG 文字貼紙產生器</title>
<style>
@font-face { font-family: 'jinxuan'; src: url('fonts/jinxuan-bold.woff2') format('woff2'); }
@font-face { font-family: 'jinxuanlatte'; src: url('fonts/jinxuanlatte-bold.woff2') format('woff2'); }
@font-face { font-family: 'lihsianti'; src: url('fonts/lihsianti.woff2') format('woff2'); }
@font-face { font-family: 'tsuhsianti'; src: url('fonts/tsuhsianti.woff2') format('woff2'); }
@font-face { font-family: 'burnfont'; src: url('fonts/burnfont.woff2') format('woff2'); }
@font-face { font-family: 'creamfont'; src: url('fonts/creamfont.woff2') format('woff2'); }
@font-face { font-family: 'twroadfont'; src: url('fonts/twroadfont.woff2') format('woff2'); }
@font-face { font-family: 'mantou'; src: url('fonts/MantouSans.woff2') format('woff2'); }
@font-face { font-family: 'biantao'; src: url('fonts/ZiHunBianTaoTi.woff2') format('woff2'); }

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; padding: 16px; padding-bottom: 120px; }
h1 { font-size: 20px; text-align: center; margin-bottom: 16px; }
.section { background: #16213e; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.section-title { font-size: 13px; color: #8899aa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
label { display: block; font-size: 14px; color: #ccc; margin-bottom: 6px; }
.font-upload-area { border: 2px dashed #334; border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
.font-upload-area:active { border-color: #667; }
.font-upload-area.has-font { border-color: #4ade80; background: rgba(74,222,128,0.05); }
#fontFileInput { display: none; }
.font-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.font-chip { background: #1a1a2e; border: 1px solid #334; border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.font-chip.active { border-color: #818cf8; background: rgba(129,140,248,0.15); color: #818cf8; }
.font-chip.builtin { border-color: #334; }
textarea { width: 100%; background: #1a1a2e; border: 1px solid #334; border-radius: 8px; color: #fff; font-size: 16px; padding: 10px; resize: vertical; min-height: 60px; }
textarea:focus { outline: none; border-color: #818cf8; }
.control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.control-row label { margin: 0; flex-shrink: 0; width: 70px; font-size: 13px; }
input[type="range"] { flex: 1; accent-color: #818cf8; height: 6px; }
.range-value { width: 50px; text-align: right; font-size: 13px; color: #818cf8; font-variant-numeric: tabular-nums; }
input[type="color"] { width: 40px; height: 34px; border: none; border-radius: 6px; cursor: pointer; background: none; }
.color-presets { display: flex; gap: 6px; flex-wrap: wrap; }
.color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
.color-dot.active { border-color: #fff; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.toggle { width: 44px; height: 24px; background: #334; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
.toggle.on { background: #818cf8; }
.toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s; }
.toggle.on::after { transform: translateX(20px); }
#previewContainer { background: repeating-conic-gradient(#2a2a3e 0% 25%, #1e1e32 0% 50%) 0 0 / 20px 20px; border-radius: 12px; min-height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; padding: 20px; }
#previewCanvas { max-width: 100%; }
.export-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #818cf8, #6366f1); color: #fff; font-size: 17px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; margin-top: 12px; transition: transform 0.1s; }
.export-btn:active { transform: scale(0.97); }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-sm { padding: 6px 14px; background: #1a1a2e; border: 1px solid #334; border-radius: 8px; color: #ccc; font-size: 13px; cursor: pointer; }
.btn-sm.active { border-color: #818cf8; color: #818cf8; background: rgba(129,140,248,0.1); }
#savedImage { max-width: 100%; border-radius: 8px; margin-top: 12px; }
.save-hint { text-align: center; font-size: 13px; color: #8899aa; margin-top: 8px; }
.font-section-label { font-size: 11px; color: #556; margin: 8px 0 4px; text-transform: uppercase; }
</style>
</head>
<body>

<h1>IG 文字貼紙產生器</h1>

<!-- Font Selection -->
<div class="section">
  <div class="section-title">字體選擇</div>
  <div class="font-section-label">內建字體</div>
  <div class="font-grid" id="builtinFontList"></div>
  <div class="font-section-label" style="margin-top:12px;">上傳自訂字體</div>
  <div class="font-upload-area" id="fontUploadArea">
    <span style="font-size:20px;">+</span> <span style="font-size:13px; color:#8899aa;">TTF / OTF / WOFF2</span>
  </div>
  <input type="file" id="fontFileInput" accept=".ttf,.otf,.woff,.woff2" multiple>
  <div class="font-grid" id="customFontList"></div>
</div>

<!-- Text Input -->
<div class="section">
  <div class="section-title">文字內容</div>
  <textarea id="textInput" placeholder="輸入你要的文字...">水電維修找我們</textarea>
</div>

<!-- Style Controls -->
<div class="section">
  <div class="section-title">樣式設定</div>
  <div class="control-row">
    <label>大小</label>
    <input type="range" id="fontSize" min="12" max="200" value="64">
    <span class="range-value" id="fontSizeVal">64px</span>
  </div>
  <div class="control-row">
    <label>行距</label>
    <input type="range" id="lineHeight" min="80" max="250" value="130">
    <span class="range-value" id="lineHeightVal">130%</span>
  </div>
  <div class="control-row">
    <label>字距</label>
    <input type="range" id="letterSpacing" min="-10" max="30" value="0">
    <span class="range-value" id="letterSpacingVal">0px</span>
  </div>
  <div class="control-row">
    <label>文字色</label>
    <input type="color" id="textColor" value="#ffffff">
    <div class="color-presets" id="textColorPresets"></div>
  </div>
  <div class="control-row">
    <label>透明度</label>
    <input type="range" id="textOpacity" min="0" max="100" value="100">
    <span class="range-value" id="textOpacityVal">100%</span>
  </div>
  <div class="control-row">
    <label>排列</label>
    <div class="btn-row">
      <button class="btn-sm active" id="horizBtn">橫排</button>
      <button class="btn-sm" id="vertBtn">直排</button>
    </div>
  </div>
  <div class="control-row">
    <label>旋轉</label>
    <input type="range" id="rotation" min="-180" max="180" value="0">
    <span class="range-value" id="rotationVal">0°</span>
  </div>
  <div class="control-row">
    <label>對齊</label>
    <div class="btn-row">
      <button class="btn-sm active" data-align="center">中</button>
      <button class="btn-sm" data-align="left">左</button>
      <button class="btn-sm" data-align="right">右</button>
    </div>
  </div>
  <div class="control-row">
    <label>樣式</label>
    <div class="btn-row">
      <button class="btn-sm" id="boldBtn"><b>粗體</b></button>
      <button class="btn-sm" id="italicBtn"><i>斜體</i></button>
      <button class="btn-sm" id="underlineBtn"><u>底線</u></button>
    </div>
  </div>
  <div class="control-row">
    <label>翻轉</label>
    <div class="btn-row">
      <button class="btn-sm" id="flipHBtn">水平翻轉</button>
      <button class="btn-sm" id="flipVBtn">垂直翻轉</button>
    </div>
  </div>
</div>

<!-- Curved Text -->
<div class="section">
  <div class="section-title">弧形文字</div>
  <div class="toggle-row">
    <label>啟用弧形</label>
    <div class="toggle" id="curveToggle"></div>
  </div>
  <div id="curveControls" style="display:none;">
    <div class="control-row">
      <label>弧度</label>
      <input type="range" id="curveRadius" min="50" max="800" value="300">
      <span class="range-value" id="curveRadiusVal">300</span>
    </div>
    <div class="control-row">
      <label>方向</label>
      <div class="btn-row">
        <button class="btn-sm active" id="curveUpBtn">向上弧</button>
        <button class="btn-sm" id="curveDownBtn">向下弧</button>
      </div>
    </div>
  </div>
</div>

<!-- Stroke -->
<div class="section">
  <div class="section-title">描邊</div>
  <div class="toggle-row">
    <label>啟用描邊</label>
    <div class="toggle" id="strokeToggle"></div>
  </div>
  <div id="strokeControls" style="display:none;">
    <div class="control-row">
      <label>粗細</label>
      <input type="range" id="strokeWidth" min="1" max="20" value="4">
      <span class="range-value" id="strokeWidthVal">4px</span>
    </div>
    <div class="control-row">
      <label>描邊色</label>
      <input type="color" id="strokeColor" value="#000000">
      <div class="color-presets" id="strokeColorPresets"></div>
    </div>
  </div>
</div>

<!-- Shadow -->
<div class="section">
  <div class="section-title">陰影</div>
  <div class="toggle-row">
    <label>啟用陰影</label>
    <div class="toggle" id="shadowToggle"></div>
  </div>
  <div id="shadowControls" style="display:none;">
    <div class="control-row">
      <label>模糊</label>
      <input type="range" id="shadowBlur" min="0" max="30" value="6">
      <span class="range-value" id="shadowBlurVal">6px</span>
    </div>
    <div class="control-row">
      <label>偏移X</label>
      <input type="range" id="shadowX" min="-20" max="20" value="2">
      <span class="range-value" id="shadowXVal">2px</span>
    </div>
    <div class="control-row">
      <label>偏移Y</label>
      <input type="range" id="shadowY" min="-20" max="20" value="2">
      <span class="range-value" id="shadowYVal">2px</span>
    </div>
    <div class="control-row">
      <label>陰影色</label>
      <input type="color" id="shadowColor" value="#000000">
    </div>
  </div>
</div>

<!-- Background Box -->
<div class="section">
  <div class="section-title">背景框</div>
  <div class="toggle-row">
    <label>啟用背景框</label>
    <div class="toggle" id="bgToggle"></div>
  </div>
  <div id="bgControls" style="display:none;">
    <div class="control-row">
      <label>背景色</label>
      <input type="color" id="bgColor" value="#000000">
    </div>
    <div class="control-row">
      <label>透明度</label>
      <input type="range" id="bgOpacity" min="0" max="100" value="70">
      <span class="range-value" id="bgOpacityVal">70%</span>
    </div>
    <div class="control-row">
      <label>圓角</label>
      <input type="range" id="bgRadius" min="0" max="40" value="12">
      <span class="range-value" id="bgRadiusVal">12px</span>
    </div>
    <div class="control-row">
      <label>內距</label>
      <input type="range" id="bgPadding" min="0" max="60" value="20">
      <span class="range-value" id="bgPaddingVal">20px</span>
    </div>
  </div>
</div>

<!-- Preview -->
<div class="section">
  <div class="section-title">預覽（棋盤格 = 透明區域）</div>
  <div id="previewContainer">
    <canvas id="previewCanvas"></canvas>
  </div>
  <button class="export-btn" id="exportBtn">產生圖片（長按儲存到相簿）</button>
  <div id="exportResult"></div>
</div>

<script>
(function() {
  // Built-in fonts
  var BUILTIN_FONTS = [
    { id: 'jinxuan', name: '金萱粗體' },
    { id: 'jinxuanlatte', name: '金萱那堤' },
    { id: 'lihsianti', name: '粒線體' },
    { id: 'tsuhsianti', name: '粗線體' },
    { id: 'burnfont', name: '激燃體' },
    { id: 'creamfont', name: '凝書體' },
    { id: 'twroadfont', name: '道路體' },
    { id: 'mantou', name: '饅頭黑體' },
    { id: 'biantao', name: '扁桃體' }
  ];

  var state = {
    fonts: [],
    activeFont: 'jinxuan',
    text: '水電維修找我們',
    fontSize: 64,
    lineHeight: 130,
    letterSpacing: 0,
    textColor: '#ffffff',
    textOpacity: 100,
    align: 'center',
    vertical: false,
    rotation: 0,
    bold: false,
    italic: false,
    underline: false,
    flipH: false,
    flipV: false,
    curve: false,
    curveRadius: 300,
    curveDown: false,
    stroke: false,
    strokeWidth: 4,
    strokeColor: '#000000',
    shadow: false,
    shadowBlur: 6,
    shadowX: 2,
    shadowY: 2,
    shadowColor: '#000000',
    bg: false,
    bgColor: '#000000',
    bgOpacity: 70,
    bgRadius: 12,
    bgPadding: 20
  };

  var SCALE = 4;
  var colorPresets = ['#ffffff','#000000','#f87171','#fb923c','#facc15','#4ade80','#38bdf8','#818cf8','#e879f9','#ff6b6b','#EABA28','#437FFF'];

  function setText(id, text) { document.getElementById(id).textContent = text; }

  function initColorPresets(containerId, inputId) {
    var container = document.getElementById(containerId);
    colorPresets.forEach(function(c) {
      var dot = document.createElement('div');
      dot.className = 'color-dot';
      dot.style.background = c;
      dot.addEventListener('click', function() {
        document.getElementById(inputId).value = c;
        document.getElementById(inputId).dispatchEvent(new Event('input'));
      });
      container.appendChild(dot);
    });
  }
  initColorPresets('textColorPresets', 'textColor');
  initColorPresets('strokeColorPresets', 'strokeColor');

  // Render built-in font list
  var builtinList = document.getElementById('builtinFontList');
  BUILTIN_FONTS.forEach(function(f) {
    var chip = document.createElement('div');
    chip.className = 'font-chip builtin' + (f.id === state.activeFont ? ' active' : '');
    chip.textContent = f.name;
    chip.style.fontFamily = f.id + ', sans-serif';
    chip.dataset.fontId = f.id;
    chip.addEventListener('click', function() {
      state.activeFont = f.id;
      updateFontChips();
      render();
    });
    builtinList.appendChild(chip);
  });

  function updateFontChips() {
    document.querySelectorAll('.font-chip').forEach(function(c) {
      var fid = c.dataset.fontId;
      c.classList.toggle('active', fid === state.activeFont);
    });
  }

  // Font upload
  document.getElementById('fontUploadArea').addEventListener('click', function() {
    document.getElementById('fontFileInput').click();
  });

  document.getElementById('fontFileInput').addEventListener('change', function(e) {
    var files = e.target.files;
    if (!files || files.length === 0) return;

    Array.from(files).forEach(function(file) {
      var fontName = file.name.replace(/\.(ttf|otf|woff2?)$/i, '');
      var reader = new FileReader();
      reader.onload = function(evt) {
        try {
          var font = new FontFace(fontName, evt.target.result);
          font.load().then(function(loaded) {
            document.fonts.add(loaded);
            if (state.fonts.indexOf(fontName) === -1) {
              state.fonts.push(fontName);
            }
            state.activeFont = fontName;
            renderCustomFontList();
            updateFontChips();
            render();
          }).catch(function(err) {
            alert('字體載入失敗: ' + err.message);
          });
        } catch(err) {
          alert('字體格式錯誤: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    });
    e.target.value = '';
  });

  function renderCustomFontList() {
    var list = document.getElementById('customFontList');
    while (list.firstChild) list.removeChild(list.firstChild);
    state.fonts.forEach(function(name) {
      var chip = document.createElement('div');
      chip.className = 'font-chip' + (name === state.activeFont ? ' active' : '');
      chip.textContent = name;
      chip.style.fontFamily = '"' + name + '", sans-serif';
      chip.dataset.fontId = name;
      chip.addEventListener('click', function() {
        state.activeFont = name;
        updateFontChips();
        render();
      });
      list.appendChild(chip);
    });
  }

  // Toggle helpers
  function bindToggle(toggleId, controlsId, stateKey) {
    document.getElementById(toggleId).addEventListener('click', function() {
      state[stateKey] = !state[stateKey];
      this.classList.toggle('on', state[stateKey]);
      if (controlsId) document.getElementById(controlsId).style.display = state[stateKey] ? 'block' : 'none';
      render();
    });
  }
  bindToggle('strokeToggle', 'strokeControls', 'stroke');
  bindToggle('shadowToggle', 'shadowControls', 'shadow');
  bindToggle('bgToggle', 'bgControls', 'bg');
  bindToggle('curveToggle', 'curveControls', 'curve');

  // Style buttons
  function bindStyleBtn(id, key) {
    document.getElementById(id).addEventListener('click', function() {
      state[key] = !state[key];
      this.classList.toggle('active', state[key]);
      render();
    });
  }
  bindStyleBtn('boldBtn', 'bold');
  bindStyleBtn('italicBtn', 'italic');
  bindStyleBtn('underlineBtn', 'underline');
  bindStyleBtn('flipHBtn', 'flipH');
  bindStyleBtn('flipVBtn', 'flipV');

  // Layout buttons
  document.getElementById('horizBtn').addEventListener('click', function() {
    state.vertical = false;
    document.getElementById('horizBtn').classList.add('active');
    document.getElementById('vertBtn').classList.remove('active');
    render();
  });
  document.getElementById('vertBtn').addEventListener('click', function() {
    state.vertical = true;
    document.getElementById('vertBtn').classList.add('active');
    document.getElementById('horizBtn').classList.remove('active');
    render();
  });

  // Curve direction
  document.getElementById('curveUpBtn').addEventListener('click', function() {
    state.curveDown = false;
    document.getElementById('curveUpBtn').classList.add('active');
    document.getElementById('curveDownBtn').classList.remove('active');
    render();
  });
  document.getElementById('curveDownBtn').addEventListener('click', function() {
    state.curveDown = true;
    document.getElementById('curveDownBtn').classList.add('active');
    document.getElementById('curveUpBtn').classList.remove('active');
    render();
  });

  // Alignment
  document.querySelectorAll('[data-align]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.align = this.dataset.align;
      document.querySelectorAll('[data-align]').forEach(function(b) {
        b.classList.toggle('active', b.dataset.align === state.align);
      });
      render();
    });
  });

  // Range inputs
  [
    ['fontSize','fontSize','px'],['lineHeight','lineHeight','%'],['letterSpacing','letterSpacing','px'],
    ['textOpacity','textOpacity','%'],['rotation','rotation','\u00b0'],['curveRadius','curveRadius',''],
    ['strokeWidth','strokeWidth','px'],['shadowBlur','shadowBlur','px'],['shadowX','shadowX','px'],
    ['shadowY','shadowY','px'],['bgOpacity','bgOpacity','%'],['bgRadius','bgRadius','px'],['bgPadding','bgPadding','px']
  ].forEach(function(cfg) {
    var el = document.getElementById(cfg[0]);
    if (!el) return;
    el.addEventListener('input', function() {
      state[cfg[1]] = parseInt(el.value);
      setText(cfg[0] + 'Val', el.value + cfg[2]);
      render();
    });
  });

  // Color inputs
  ['textColor','strokeColor','shadowColor','bgColor'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function(e) {
      state[id] = e.target.value;
      render();
    });
  });

  // Text input
  document.getElementById('textInput').addEventListener('input', function(e) {
    state.text = e.target.value;
    render();
  });

  // === RENDER ===
  function render() {
    var canvas = document.getElementById('previewCanvas');
    var ctx = canvas.getContext('2d');
    var text = state.text || ' ';
    var lines = text.split('\n');
    if (lines.length === 0) lines = [' '];

    var fontStyle = (state.italic ? 'italic ' : '') + (state.bold ? 'bold ' : '');
    var fontFamily = '"' + state.activeFont + '", -apple-system, sans-serif';
    var fontSize = state.fontSize * SCALE;
    var lineH = fontSize * (state.lineHeight / 100);
    var letterSp = state.letterSpacing * SCALE;

    // Curved text mode
    if (state.curve && !state.vertical) {
      renderCurved(canvas, ctx, lines, fontStyle, fontFamily, fontSize, letterSp);
      return;
    }

    ctx.font = fontStyle + fontSize + 'px ' + fontFamily;

    var contentW, contentH;
    if (state.vertical) {
      var maxChars = 0;
      lines.forEach(function(l) { if (l.length > maxChars) maxChars = l.length; });
      var colSp = fontSize * (state.lineHeight / 100);
      contentW = colSp * lines.length;
      contentH = fontSize * maxChars + letterSp * Math.max(0, maxChars - 1);
    } else {
      var maxW = 0;
      var lw = [];
      lines.forEach(function(l) {
        var w = ctx.measureText(l).width;
        if (letterSp && l.length > 1) w += letterSp * (l.length - 1);
        lw.push(w);
        if (w > maxW) maxW = w;
      });
      contentW = maxW;
      contentH = lineH * lines.length;
    }

    var pad = state.bg ? state.bgPadding * SCALE : 0;
    var sEx = state.stroke ? state.strokeWidth * SCALE : 0;
    var shEx = state.shadow ? (Math.max(Math.abs(state.shadowX), Math.abs(state.shadowY)) + state.shadowBlur) * SCALE : 0;
    var extra = sEx + shEx + 5 * SCALE;
    var innerW = contentW + pad * 2 + extra * 2;
    var innerH = contentH + pad * 2 + extra * 2;

    var angle = state.rotation * Math.PI / 180;
    var cosA = Math.abs(Math.cos(angle));
    var sinA = Math.abs(Math.sin(angle));
    var cw = Math.ceil(innerW * cosA + innerH * sinA) + 4 * SCALE;
    var ch = Math.ceil(innerW * sinA + innerH * cosA) + 4 * SCALE;

    canvas.width = cw; canvas.height = ch;
    var dw = Math.min(cw / SCALE, 360);
    canvas.style.width = dw + 'px';
    canvas.style.height = (ch / SCALE) * (dw / (cw / SCALE)) + 'px';
    ctx.clearRect(0, 0, cw, ch);

    ctx.save();
    ctx.translate(cw / 2, ch / 2);
    ctx.rotate(angle);
    if (state.flipH) ctx.scale(-1, 1);
    if (state.flipV) ctx.scale(1, -1);
    ctx.translate(-innerW / 2, -innerH / 2);

    var ox = extra, oy = extra;

    // Background
    if (state.bg) drawBg(ctx, ox - pad, oy - pad, contentW + pad * 2, contentH + pad * 2);

    ctx.font = fontStyle + fontSize + 'px ' + fontFamily;
    ctx.textBaseline = 'top';
    ctx.globalAlpha = state.textOpacity / 100;

    if (state.vertical) {
      var colSp2 = fontSize * (state.lineHeight / 100);
      lines.forEach(function(line, ci) {
        var x = ox + contentW - colSp2 * (ci + 1) + (colSp2 - fontSize) / 2;
        for (var i = 0; i < line.length; i++) {
          var cw2 = ctx.measureText(line[i]).width;
          drawChar(ctx, line[i], x + (fontSize - cw2) / 2, oy + i * (fontSize + letterSp), fontSize);
        }
      });
    } else {
      // Recalculate lw
      var lw2 = []; var mw2 = 0;
      lines.forEach(function(l) {
        var w = ctx.measureText(l).width;
        if (letterSp && l.length > 1) w += letterSp * (l.length - 1);
        lw2.push(w); if (w > mw2) mw2 = w;
      });
      lines.forEach(function(line, i) {
        var x = ox;
        if (state.align === 'center') x = ox + (contentW - lw2[i]) / 2;
        else if (state.align === 'right') x = ox + contentW - lw2[i];
        var y = oy + i * lineH;
        if (letterSp && line.length > 1) {
          var cx2 = x;
          for (var j = 0; j < line.length; j++) {
            drawChar(ctx, line[j], cx2, y, fontSize);
            cx2 += ctx.measureText(line[j]).width + letterSp;
          }
        } else {
          drawChar(ctx, line, x, y, fontSize);
        }
      });
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Curved text rendering
  function renderCurved(canvas, ctx, lines, fontStyle, fontFamily, fontSize, letterSp) {
    var line = lines.join(' ');
    var radius = state.curveRadius * SCALE;

    ctx.font = fontStyle + fontSize + 'px ' + fontFamily;

    // Measure each char
    var chars = [];
    var totalW = 0;
    for (var i = 0; i < line.length; i++) {
      var w = ctx.measureText(line[i]).width;
      chars.push({ ch: line[i], w: w });
      totalW += w + (i < line.length - 1 ? letterSp : 0);
    }

    var totalAngle = totalW / radius;
    var sEx = state.stroke ? state.strokeWidth * SCALE : 0;
    var shEx = state.shadow ? (Math.max(Math.abs(state.shadowX), Math.abs(state.shadowY)) + state.shadowBlur) * SCALE : 0;
    var margin = sEx + shEx + fontSize + 10 * SCALE;

    var size = (radius + margin) * 2;
    var cw = Math.ceil(size) + 4 * SCALE;
    var ch = Math.ceil(size) + 4 * SCALE;

    // Apply rotation to canvas size
    var angle = state.rotation * Math.PI / 180;
    var cosA = Math.abs(Math.cos(angle));
    var sinA = Math.abs(Math.sin(angle));
    var finalW = Math.ceil(cw * cosA + ch * sinA);
    var finalH = Math.ceil(cw * sinA + ch * cosA);

    canvas.width = finalW; canvas.height = finalH;
    var dw = Math.min(finalW / SCALE, 360);
    canvas.style.width = dw + 'px';
    canvas.style.height = (finalH / SCALE) * (dw / (finalW / SCALE)) + 'px';
    ctx.clearRect(0, 0, finalW, finalH);

    ctx.save();
    ctx.translate(finalW / 2, finalH / 2);
    ctx.rotate(angle);
    if (state.flipH) ctx.scale(-1, 1);
    if (state.flipV) ctx.scale(1, -1);

    // Background (circular segment)
    if (state.bg) {
      var pad = state.bgPadding * SCALE;
      var bgR = state.bgRadius * SCALE;
      var arcOuter = radius + fontSize / 2 + pad;
      var arcInner = radius - fontSize / 2 - pad;
      var bgAngle = totalAngle + (pad * 2) / radius;
      var startA = -Math.PI / 2 - bgAngle / 2;
      var endA = -Math.PI / 2 + bgAngle / 2;
      var cy = state.curveDown ? -radius : radius;

      var alphaHex = Math.round(state.bgOpacity * 2.55).toString(16).padStart(2, '0');
      ctx.fillStyle = state.bgColor + alphaHex;
      ctx.beginPath();
      if (state.curveDown) {
        ctx.arc(0, cy, arcOuter, Math.PI - endA, Math.PI - startA);
        ctx.arc(0, cy, arcInner, Math.PI - startA, Math.PI - endA, true);
      } else {
        ctx.arc(0, -cy, arcOuter, startA, endA);
        ctx.arc(0, -cy, arcInner, endA, startA, true);
      }
      ctx.closePath();
      ctx.fill();
    }

    ctx.font = fontStyle + fontSize + 'px ' + fontFamily;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.globalAlpha = state.textOpacity / 100;

    var startAngle = -totalAngle / 2;
    var currentAngle = startAngle;

    for (var j = 0; j < chars.length; j++) {
      var charAngle = chars[j].w / radius;
      var midAngle = currentAngle + charAngle / 2;

      ctx.save();
      if (state.curveDown) {
        var drawAngle = Math.PI / 2 - midAngle;
        ctx.rotate(drawAngle);
        ctx.translate(0, radius);
        ctx.rotate(Math.PI);
      } else {
        var drawAngle2 = -Math.PI / 2 + midAngle;
        ctx.rotate(drawAngle2);
        ctx.translate(0, -radius);
      }

      drawCharCurved(ctx, chars[j].ch, 0, 0, fontSize);
      ctx.restore();

      currentAngle += charAngle + letterSp / radius;
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawBg(ctx, x, y, w, h) {
    var r = state.bgRadius * SCALE;
    var alphaHex = Math.round(state.bgOpacity * 2.55).toString(16).padStart(2, '0');
    ctx.fillStyle = state.bgColor + alphaHex;
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(x, y, w, h, r);
    } else {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
    ctx.fill();
  }

  function drawChar(ctx, char, x, y, fontSize) {
    applyShadow(ctx);
    if (state.stroke) {
      ctx.strokeStyle = state.strokeColor;
      ctx.lineWidth = state.strokeWidth * SCALE;
      ctx.lineJoin = 'round'; ctx.miterLimit = 2;
      ctx.strokeText(char, x, y);
    }
    ctx.fillStyle = state.textColor;
    ctx.fillText(char, x, y);
    if (state.underline) {
      var w = ctx.measureText(char).width;
      ctx.fillRect(x, y + fontSize * 0.9, w, Math.max(2, fontSize * 0.05));
    }
    clearShadow(ctx);
  }

  function drawCharCurved(ctx, char, x, y, fontSize) {
    applyShadow(ctx);
    if (state.stroke) {
      ctx.strokeStyle = state.strokeColor;
      ctx.lineWidth = state.strokeWidth * SCALE;
      ctx.lineJoin = 'round'; ctx.miterLimit = 2;
      ctx.strokeText(char, x, y);
    }
    ctx.fillStyle = state.textColor;
    ctx.fillText(char, x, y);
    clearShadow(ctx);
  }

  function applyShadow(ctx) {
    if (state.shadow) {
      ctx.shadowColor = state.shadowColor;
      ctx.shadowBlur = state.shadowBlur * SCALE;
      ctx.shadowOffsetX = state.shadowX * SCALE;
      ctx.shadowOffsetY = state.shadowY * SCALE;
    }
  }
  function clearShadow(ctx) {
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  }

  // Export
  document.getElementById('exportBtn').addEventListener('click', function() {
    var canvas = document.getElementById('previewCanvas');
    var dataUrl = canvas.toDataURL('image/png');
    var result = document.getElementById('exportResult');
    while (result.firstChild) result.removeChild(result.firstChild);

    var img = document.createElement('img');
    img.id = 'savedImage';
    img.src = dataUrl;
    result.appendChild(img);

    var hint = document.createElement('div');
    hint.className = 'save-hint';
    hint.textContent = '\u9577\u6309\u4e0a\u65b9\u5716\u7247 \u2192 \u5132\u5b58\u5230\u76f8\u7c3f \u2192 IG \u9650\u52d5\u7528\u300c\u8cbc\u5716\u300d\u8cbc\u4e0a';
    result.appendChild(hint);
  });

  // Preload built-in fonts then render
  var preloadText = document.createElement('div');
  preloadText.style.cssText = 'position:absolute;left:-9999px;font-size:1px;';
  BUILTIN_FONTS.forEach(function(f) {
    var span = document.createElement('span');
    span.style.fontFamily = f.id;
    span.textContent = '\u6e2c';
    preloadText.appendChild(span);
  });
  document.body.appendChild(preloadText);

  // Wait for fonts to load
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function() { render(); });
  }
  setTimeout(render, 500);
  setTimeout(render, 2000);
})();
</script>
</body>
</html>
